<svg xmlns="http://www.w3.org/2000/svg" width="980" height="352" viewBox="0 0 980 352" role="img" aria-labelledby="title desc">
<title id="title">Prim minimum spanning tree trace</title>
<desc id="desc">Each chosen edge is the cheapest edge crossing the visited/unvisited cut</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="65" y="38" font-family="Arial" font-size="24" font-weight="700" fill="#222">Prim minimum spanning tree trace</text>
<text x="65" y="64" font-family="Arial" font-size="14" fill="#555">Each chosen edge is the cheapest edge crossing the visited/unvisited cut</text>
<line x1="90" y1="96" x2="90" y2="317" stroke="#009E73" stroke-width="4"/>
<circle cx="90" cy="96" r="16" fill="#009E73"/>
<text x="90" y="101" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">1</text>
<text x="125" y="94" font-family="Arial" font-size="16" font-weight="700" fill="#222">Start at A</text>
<text x="125" y="116" font-family="Arial" font-size="14" fill="#555">Create the first tree component</text>
<rect x="735" y="73" width="190" height="36" rx="8" fill="#f3f5f7"/>
<text x="830" y="96" text-anchor="middle" font-family="Arial" font-size="14" fill="#222">weight = 0</text>
<circle cx="90" cy="154" r="16" fill="#009E73"/>
<text x="90" y="159" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">2</text>
<text x="125" y="152" font-family="Arial" font-size="16" font-weight="700" fill="#222">Select A to C</text>
<text x="125" y="174" font-family="Arial" font-size="14" fill="#555">Cheapest edge crossing the current cut</text>
<rect x="735" y="131" width="190" height="36" rx="8" fill="#f3f5f7"/>
<text x="830" y="154" text-anchor="middle" font-family="Arial" font-size="14" fill="#222">total = 2</text>
<circle cx="90" cy="212" r="16" fill="#009E73"/>
<text x="90" y="217" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">3</text>
<text x="125" y="210" font-family="Arial" font-size="16" font-weight="700" fill="#222">Select C to B</text>
<text x="125" y="232" font-family="Arial" font-size="14" fill="#555">Cheapest edge crossing the current cut</text>
<rect x="735" y="189" width="190" height="36" rx="8" fill="#f3f5f7"/>
<text x="830" y="212" text-anchor="middle" font-family="Arial" font-size="14" fill="#222">total = 3</text>
<circle cx="90" cy="270" r="16" fill="#009E73"/>
<text x="90" y="275" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">4</text>
<text x="125" y="268" font-family="Arial" font-size="16" font-weight="700" fill="#222">Select B to D</text>
<text x="125" y="290" font-family="Arial" font-size="14" fill="#555">Cheapest edge crossing the current cut</text>
<rect x="735" y="247" width="190" height="36" rx="8" fill="#f3f5f7"/>
<text x="830" y="270" text-anchor="middle" font-family="Arial" font-size="14" fill="#222">total = 8</text>
</svg>